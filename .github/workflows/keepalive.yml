name: keepalive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          while read -r u; do
            [ -z "$u" ] && continue
            echo "$u -> $(curl -sS -m 40 -o /dev/null -w '%{http_code}' "$u/ping" || echo ERR)"
          done < urls.txt
